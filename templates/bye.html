<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>אי-אפשר לצאת מפה</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #440000, #000000 90%);
            color: #ff0000;
            font-family: "Arial Black", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        h1 {
            font-size: 80px;
            text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.2;
            }
        }
    </style>
</head>
<body>

    <h1>אין חיבור לאינטרנט<br>לא ניתן לצאת</h1>

</body>
</html>
